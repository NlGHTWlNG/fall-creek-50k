<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fall Creek 50K">
  <meta name="theme-color" content="#1a2e1a">
  <title>Fall Creek 50K Training Plan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #f9f6f1; font-family: Georgia, serif; color: #1a1a1a; overflow-x: hidden; }
    body { padding-bottom: env(safe-area-inset-bottom); }
    #install-banner { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #1a2e1a; color: white; padding: 12px 20px; justify-content: space-between; align-items: center; z-index: 1000; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
    #install-banner p { font-family: system-ui, sans-serif; font-size: 13px; }
    #install-btn { background: #4a7c59; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-family: system-ui, sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
    #dismiss-btn { background: transparent; color: #9dc49d; border: none; padding: 8px; font-family: system-ui, sans-serif; font-size: 13px; cursor: pointer; }

    /* ── Header ── */
    .header { background: linear-gradient(135deg, #1a2e1a 0%, #2c4a2c 60%, #3d6b3d 100%); padding: calc(48px + env(safe-area-inset-top)) 20px 32px; color: white; }
    .header-inner { max-width: 900px; margin: 0 auto; }
    .header-eyebrow { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: #9dc49d; margin-bottom: 8px; font-family: system-ui, sans-serif; }
    .header h1 { font-size: 26px; font-weight: 700; margin-bottom: 4px; line-height: 1.2; }
    .header-sub { font-size: 13px; color: #c8dfc8; margin-bottom: 18px; font-family: system-ui, sans-serif; }
    .header-stats { display: flex; gap: 18px; flex-wrap: wrap; }
    .stat label { display: block; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: #9dc49d; font-family: system-ui, sans-serif; }
    .stat span { display: block; font-size: 15px; font-weight: 600; margin-top: 1px; }

    /* ── Phase nav ── */
    .phase-nav { background: #2a2a2a; display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .phase-nav::-webkit-scrollbar { display: none; }
    .phase-nav-inner { max-width: 900px; margin: 0 auto; display: flex; width: 100%; }
    .phase-btn { background: transparent; color: #aaa; border: none; border-bottom: 3px solid transparent; padding: 11px 14px; cursor: pointer; font-size: 11px; font-family: system-ui, sans-serif; white-space: nowrap; flex-shrink: 0; line-height: 1.3; }
    .phase-btn.active { color: white; font-weight: 700; }
    .phase-btn small { display: block; font-size: 9px; color: #666; }
    .phase-btn.active small { color: rgba(255,255,255,0.6); }

    /* ── Content ── */
    .content { padding: 18px 14px 80px; max-width: 900px; margin: 0 auto; }

    /* ── Phase header ── */
    .eyebrow { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; font-family: system-ui, sans-serif; margin-bottom: 4px; }
    h2.phase-title { font-size: 20px; margin-bottom: 3px; }
    .phase-sub { font-size: 14px; color: #555; font-style: italic; margin-bottom: 18px; }

    /* ── Goals ── */
    .goals-box { border-radius: 8px; padding: 14px; margin-bottom: 18px; }
    .goals-lbl { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-family: system-ui, sans-serif; font-weight: 700; margin-bottom: 8px; }
    .goal-row { display: flex; gap: 8px; margin-bottom: 6px; }
    .goal-chk { font-weight: 700; font-size: 13px; flex-shrink: 0; }
    .goal-txt { font-family: system-ui, sans-serif; font-size: 13px; line-height: 1.5; }

    /* ── Tabs ── */
    .tab-bar { display: flex; border-bottom: 2px solid #e5e5e5; margin-bottom: 18px; }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; padding: 10px 8px; cursor: pointer; font-size: 11px; font-family: system-ui, sans-serif; white-space: nowrap; margin-bottom: -2px; color: #888; flex: 1; text-align: center; }
    .tab-btn.active { font-weight: 700; }

    /* ── Week pills ── */
    .week-pills { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; }
    .week-pill { background: white; color: #555; border: 1px solid #ddd; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 12px; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    .week-pill.active { color: white; font-weight: 700; }

    /* ── Week header ── */
    .week-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .week-title-txt { font-family: system-ui, sans-serif; font-weight: 700; font-size: 16px; }
    .week-dates-txt { font-family: system-ui, sans-serif; font-size: 12px; color: #888; margin-top: 2px; }
    .week-meta { display: flex; align-items: center; gap: 7px; }
    .week-count { font-family: system-ui, sans-serif; font-size: 11px; color: #999; }
    .week-badge { color: white; border-radius: 6px; padding: 5px 13px; font-family: system-ui, sans-serif; font-weight: 700; font-size: 14px; }

    /* ── Progress bar ── */
    .progress-bar { height: 3px; background: #eee; border-radius: 4px; margin-bottom: 11px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }

    /* ── Day rows ── */
    .day-row { display: grid; grid-template-columns: 26px 48px 1fr 56px; gap: 12px; padding: 13px 16px; border: 1px solid #e8e8e8; border-left: 3px solid #ccc; border-radius: 6px; margin-bottom: 7px; align-items: center; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.15s; }
    .day-row:active { opacity: 0.75; }
    .cb { width: 20px; height: 20px; border-radius: 4px; border: 2px solid #ccc; background: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; font-weight: 700; color: white; transition: all 0.15s; }
    .day-lbl { font-family: system-ui, sans-serif; font-weight: 700; font-size: 13px; color: #444; }
    .day-act { font-family: system-ui, sans-serif; font-weight: 600; font-size: 14px; margin-bottom: 2px; }
    .day-notes-txt { font-family: system-ui, sans-serif; font-size: 12px; color: #999; }
    .day-mi { font-family: system-ui, sans-serif; font-weight: 700; font-size: 14px; text-align: right; }
    .week-complete { padding: 11px 14px; border-radius: 6px; text-align: center; font-family: system-ui, sans-serif; font-weight: 700; font-size: 13px; margin-top: 10px; }

    /* ── Coach note ── */
    .coach-note { margin-top: 13px; padding: 14px 16px; background: #fffbf0; border: 1px solid #f0d070; border-radius: 6px; }
    .cn-lbl { font-family: system-ui, sans-serif; font-weight: 700; font-size: 11px; color: #a07010; margin-bottom: 5px; letter-spacing: 1px; text-transform: uppercase; }
    .cn-txt { font-family: system-ui, sans-serif; font-size: 13px; color: #555; line-height: 1.6; }

    /* ── Mileage tab ── */
    .mi-row { padding: 14px 16px; background: white; border: 1px solid #e8e8e8; border-radius: 6px; margin-bottom: 8px; }
    .mi-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .mi-wk { font-family: system-ui, sans-serif; font-weight: 700; font-size: 13px; }
    .mi-total { font-family: system-ui, sans-serif; font-weight: 700; font-size: 18px; }
    .day-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
    .day-cell { text-align: center; }
    .dc-lbl { font-size: 9px; font-family: system-ui, sans-serif; color: #999; margin-bottom: 2px; }
    .dc-val { border-radius: 3px; padding: 4px 2px; font-size: 10px; font-family: system-ui, sans-serif; font-weight: 600; }

    /* ── Bar chart ── */
    .bar-chart { margin-top: 18px; padding: 16px; background: white; border: 1px solid #e8e8e8; border-radius: 8px; }
    .bc-lbl { font-family: system-ui, sans-serif; font-size: 11px; font-weight: 700; color: #888; margin-bottom: 14px; letter-spacing: 1px; text-transform: uppercase; }
    .bars { display: flex; align-items: flex-end; gap: 5px; height: 80px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
    .bar-fill { width: 100%; border-radius: 3px 3px 0 0; opacity: 0.85; }
    .bar-lbl { font-family: system-ui, sans-serif; font-size: 9px; color: #999; }

    /* ── Warmup / calisthenics ── */
    .sec-div { display: flex; align-items: center; gap: 10px; margin: 8px 0 16px; }
    .sec-div-txt { font-family: system-ui, sans-serif; font-weight: 800; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #888; white-space: nowrap; }
    .sec-div-line { flex: 1; height: 1px; background: #e5e5e5; }
    .routine-hdr { border-left: 4px solid #ccc; padding-left: 14px; margin-bottom: 12px; }
    .routine-title { font-size: 16px; font-family: system-ui, sans-serif; font-weight: 700; color: #1a1a1a; margin-bottom: 2px; }
    .routine-sub { font-family: system-ui, sans-serif; font-size: 12px; font-weight: 600; }
    .routine-note { padding: 11px 14px; background: #fffbf0; border: 1px solid #f0d070; border-radius: 6px; margin-bottom: 11px; font-family: system-ui, sans-serif; font-size: 12px; color: #666; line-height: 1.6; font-style: italic; }
    .step-row { display: grid; grid-template-columns: 34px 1fr auto; gap: 12px; padding: 13px 14px; background: white; border: 1px solid #e8e8e8; border-left: 3px solid #ccc; border-radius: 6px; margin-bottom: 7px; align-items: flex-start; }
    .step-icon { font-size: 18px; text-align: center; }
    .step-name { font-family: system-ui, sans-serif; font-weight: 700; font-size: 13px; color: #1a1a1a; margin-bottom: 3px; }
    .step-desc { font-family: system-ui, sans-serif; font-size: 12px; color: #666; line-height: 1.5; }
    .step-dur { font-family: system-ui, sans-serif; font-weight: 700; font-size: 11px; text-align: right; white-space: nowrap; min-width: 65px; }
    .pn-box { padding: 13px 14px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-start; }
    .pn-icon { font-size: 16px; flex-shrink: 0; }
    .pn-title { font-family: system-ui, sans-serif; font-weight: 700; font-size: 12px; margin-bottom: 3px; }
    .pn-text { font-family: system-ui, sans-serif; font-size: 13px; color: #555; line-height: 1.5; }

    /* ── Nutrition ── */
    .cal-box { border-radius: 8px; padding: 18px; color: white; margin-bottom: 14px; }
    .cal-lbl { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.75; font-family: system-ui, sans-serif; margin-bottom: 12px; font-weight: 700; }
    .cal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .cal-card { background: rgba(255,255,255,0.15); border-radius: 6px; padding: 12px 14px; }
    .cal-card-lbl { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; font-family: system-ui, sans-serif; margin-bottom: 3px; }
    .cal-card-val { font-size: 20px; font-weight: 700; font-family: system-ui, sans-serif; }
    .cal-card-unit { font-size: 10px; opacity: 0.75; font-family: system-ui, sans-serif; }
    .macro-div { border-top: 1px solid rgba(255,255,255,0.2); padding-top: 12px; }
    .macro-lbl { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.75; font-family: system-ui, sans-serif; margin-bottom: 8px; font-weight: 700; }
    .macro-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .macro-card { background: rgba(255,255,255,0.1); border-radius: 6px; padding: 9px 10px; text-align: center; }
    .macro-val { font-size: 14px; font-weight: 700; font-family: system-ui, sans-serif; }
    .macro-name { font-size: 9px; opacity: 0.75; font-family: system-ui, sans-serif; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
    .nutr-card { padding: 14px 16px; background: white; border: 1px solid #e8e8e8; border-left: 3px solid #ccc; border-radius: 6px; margin-bottom: 8px; }
    .nutr-title { font-family: system-ui, sans-serif; font-weight: 700; font-size: 13px; margin-bottom: 5px; color: #1a1a1a; }
    .nutr-detail { font-family: system-ui, sans-serif; font-size: 13px; color: #555; line-height: 1.6; }

    /* ── Race day ── */
    .race-h2 { font-size: 24px; margin-bottom: 4px; color: #8a3a3a; }
    .race-sub { color: #666; font-family: system-ui, sans-serif; font-size: 13px; margin-bottom: 26px; }
    .race-section { margin-bottom: 26px; }
    .race-sec-title { font-size: 13px; font-family: system-ui, sans-serif; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #8a3a3a; border-bottom: 2px solid #f0e0e0; padding-bottom: 7px; margin-bottom: 14px; }
    .race-item { display: flex; gap: 12px; margin-bottom: 10px; align-items: flex-start; }
    .race-dot { width: 7px; height: 7px; background: #8a3a3a; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
    .race-txt { font-family: system-ui, sans-serif; font-size: 14px; line-height: 1.6; }

    /* ── Desktop ── */
    @media (min-width: 768px) {
      .header { padding: 56px 5% 40px; }
      .header-inner { max-width: 100%; }
      .phase-nav-inner { max-width: 100%; }
      .header h1 { font-size: 42px; }
      .header-sub { font-size: 16px; }
      .stat span { font-size: 20px; }
      .stat label { font-size: 10px; }
      .header-stats { gap: 40px; }
      .phase-btn { font-size: 14px; padding: 16px 28px; }
      .phase-btn small { font-size: 11px; }
      .content { padding: 36px 5% 80px; max-width: 100%; }
      h2.phase-title { font-size: 30px; }
      .phase-sub { font-size: 17px; }
      .goal-txt { font-size: 15px; }
      .goals-box { padding: 20px; }
      .tab-btn { font-size: 14px; padding: 12px 16px; }
      .week-pill { font-size: 14px; padding: 8px 16px; }
      .week-title-txt { font-size: 20px; }
      .week-badge { font-size: 17px; padding: 6px 16px; }
      .day-row { grid-template-columns: 28px 70px 1fr 72px; gap: 18px; padding: 16px 20px; }
      .day-lbl { font-size: 15px; }
      .day-act { font-size: 16px; }
      .day-notes-txt { font-size: 13px; }
      .day-mi { font-size: 16px; }
      .cn-txt { font-size: 15px; }
      .cn-lbl { font-size: 12px; }
      .coach-note { padding: 18px 20px; }
      .mi-wk { font-size: 15px; }
      .mi-total { font-size: 22px; }
      .dc-lbl { font-size: 11px; }
      .dc-val { font-size: 12px; padding: 6px 3px; }
      .bars { height: 120px; }
      .bar-lbl { font-size: 11px; }
      .step-name { font-size: 15px; }
      .step-desc { font-size: 14px; }
      .step-dur { font-size: 13px; min-width: 75px; }
      .nutr-title { font-size: 15px; }
      .nutr-detail { font-size: 15px; }
      .race-h2 { font-size: 32px; }
      .race-txt { font-size: 16px; }
      .cal-card-val { font-size: 26px; }
      .macro-val { font-size: 18px; }
      .routine-title { font-size: 20px; }
      .routine-sub { font-size: 14px; }
      .pn-text { font-size: 15px; }
      .week-count { font-size: 13px; }
      .eyebrow { font-size: 12px; }
    }
    @media (min-width: 1400px) {
      .header { padding: 60px 8% 48px; }
      .content { padding: 40px 8% 80px; }
    }
  </style>
</head>
<body>

<div id="install-banner">
  <p>📱 Add to home screen for offline access</p>
  <div style="display:flex;gap:8px">
    <button id="dismiss-btn" onclick="document.getElementById('install-banner').style.display='none'">Not now</button>
    <button id="install-btn">Install</button>
  </div>
</div>

<div id="app"></div>

// ── State ──────────────────────────────────────────────────────────
let S = { pi: 0, tab: 'schedule', wi: 0, checked: {} };
try { const s = localStorage.getItem('fc50k'); if(s) S.checked = JSON.parse(s); } catch(e) {}
function save() { try { localStorage.setItem('fc50k', JSON.stringify(S.checked)); } catch(e) {} }
function toggleDay(pi,wi,di) { const k=`p${pi}-w${wi}-d${di}`; S.checked[k]=!S.checked[k]; save(); render(); }
function done(pi,wi,di) { return !!S.checked[`p${pi}-w${wi}-d${di}`]; }
function weekDone(pi,wi,n) { let c=0; for(let d=0;d<n;d++) if(S.checked[`p${pi}-w${wi}-d${d}`])c++; return c; }

// ── Helpers ────────────────────────────────────────────────────────
function dc(activity, phaseColor) {
  if(activity==='Rest') return '#ccc';
  if(activity.startsWith('CrossFit')) return '#e8a020';
  if(activity==='RACE DAY') return '#8a3a3a';
  return phaseColor;
}
function h(tag, cls, style, ...kids) {
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(style) Object.assign(e.style, style);
  for(const k of kids.flat(99)) {
    if(k==null) continue;
    e.appendChild(typeof k==='string' ? document.createTextNode(k) : k);
  }
  return e;
}
function d(cls,style,...kids) { return h('div',cls,style,...kids); }
function s(cls,style,...kids) { return h('span',cls,style,...kids); }
function btn(cls,style,onclick,...kids) {
  const e=h('button',cls,style,...kids);
  e.onclick=onclick;
  return e;
}

// ── Render ─────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  while(app.firstChild) app.removeChild(app.firstChild);

  app.appendChild(renderHeader());
  app.appendChild(renderPhaseNav());
  const content = d('content',null);
  if(S.pi===4) content.appendChild(renderRaceDay());
  else content.appendChild(renderPhase(phases[S.pi], S.pi));
  app.appendChild(content);

  // scroll to top on phase/tab change
  window.scrollTo(0,0);
}

function renderHeader() {
  const wrap = d('header',null);
  const inner = d('header-inner',null);
  inner.appendChild(d('header-eyebrow',null,'Fall Creek Falls, Tennessee'));
  inner.appendChild(h('h1',null,null,'Fall Creek 100 · 50K'));
  inner.appendChild(d('header-sub',null,'21-Week Training Plan · June 29 – November 21, 2026'));
  const stats = d('header-stats',null);
  [['Race Day','Nov 21, 2026'],['Start','6:30am'],['Distance','50K'],['Elev.','3,100ft'],['Goal Wt','≤165 lbs'],['Cutoff','18 hrs']].forEach(([l,v])=>{
    const st = d('stat',null);
    st.appendChild(h('label',null,null,l));
    st.appendChild(h('span',null,null,v));
    stats.appendChild(st);
  });
  inner.appendChild(stats);
  wrap.appendChild(inner);
  return wrap;
}

function renderPhaseNav() {
  const nav = d('phase-nav',null);
  const inner = d('phase-nav-inner',null);
  phases.forEach((ph,i)=>{
    const isA = S.pi===i;
    const b = btn('phase-btn'+(isA?' active':''), isA?{background:ph.color,borderBottomColor:ph.color}:{},
      ()=>{ S.pi=i; S.tab='schedule'; S.wi=0; render(); },
      ph.name.split(':')[0], h('small',null,null,ph.weeks)
    );
    inner.appendChild(b);
  });
  const isR = S.pi===4;
  inner.appendChild(btn('phase-btn'+(isR?' active':''), isR?{background:'#8a3a3a',borderBottomColor:'#8a3a3a'}:{},
    ()=>{ S.pi=4; render(); }, 'Race Day', h('small',null,null,'Nov 21')
  ));
  nav.appendChild(inner);
  return nav;
}

function renderPhase(phase, pi) {
  const wrap = d(null,null);
  wrap.appendChild(d('eyebrow',{color:phase.color},`${phase.weeks} · ${phase.dates}`));
  wrap.appendChild(h('h2','phase-title',null,phase.name));
  wrap.appendChild(d('phase-sub',null,phase.subtitle));

  // Goals
  const gb = d('goals-box',{background:phase.accent,border:`1px solid ${phase.color}22`});
  gb.appendChild(d('goals-lbl',{color:phase.color},'Phase Goals'));
  phase.goals.forEach(g=>{
    const row=d('goal-row',null);
    row.appendChild(d('goal-chk',{color:phase.color},'✓'));
    row.appendChild(d('goal-txt',null,g));
    gb.appendChild(row);
  });
  wrap.appendChild(gb);

  // Tabs
  const tb = d('tab-bar',null);
  [['schedule','Weekly Schedule'],['mileage','Mileage'],['warmup','Pre/Post Run'],['calisthenics','Daily 10'],['nutrition','Nutrition']].forEach(([id,lbl])=>{
    const isA=S.tab===id;
    tb.appendChild(btn('tab-btn'+(isA?' active':''), isA?{color:phase.color,borderBottomColor:phase.color}:{}, ()=>{S.tab=id;render();}, lbl));
  });
  wrap.appendChild(tb);

  if(S.tab==='schedule') wrap.appendChild(renderSchedule(phase,pi));
  else if(S.tab==='mileage') wrap.appendChild(renderMileage(phase,pi));
  else if(S.tab==='warmup') wrap.appendChild(renderWarmup(phase,pi));
  else if(S.tab==='calisthenics') wrap.appendChild(renderCalisthenics(pi));
  else if(S.tab==='nutrition') wrap.appendChild(renderNutrition(phase,pi));
  return wrap;
}

function renderSchedule(phase, pi) {
  const wrap = d(null,null);
  // Pills
  const pills = d('week-pills',null);
  phase.weeklySchedule.forEach((w,wi)=>{
    const c=weekDone(pi,wi,w.days.length), all=c===w.days.length;
    const isA=S.wi===wi;
    const b=btn('week-pill'+(isA?' active':''),{
      background:isA?phase.color:all?phase.color+'22':'white',
      color:isA?'white':'#555',
      borderColor:isA?phase.color:all?phase.color:'#ddd'
    },()=>{S.wi=wi;render();}, w.week.replace('Week ','Wk '));
    if(c>0) b.appendChild(s(null,{marginLeft:'4px',fontSize:'9px',background:all?(isA?'rgba(255,255,255,0.3)':phase.color):'#aaa',color:'white',borderRadius:'10px',padding:'1px 4px',fontWeight:700}, all?'✓':`${c}/${w.days.length}`));
    pills.appendChild(b);
  });
  wrap.appendChild(pills);

  const w=phase.weeklySchedule[S.wi];
  const c=weekDone(pi,S.wi,w.days.length), all=c===w.days.length;

  // Week header
  const wh=d('week-header',null);
  const wt=d(null,null,d('week-title-txt',null,w.week),d('week-dates-txt',null,w.label));
  const wm=d('week-meta',null,d('week-count',null,`${c}/${w.days.length} days`),d('week-badge',{background:phase.color},w.total));
  wh.appendChild(wt); wh.appendChild(wm);
  wrap.appendChild(wh);

  // Progress
  const pb=d('progress-bar',null,d('progress-fill',{width:`${(c/w.days.length)*100}%`,background:phase.color}));
  wrap.appendChild(pb);

  // Days
  w.days.forEach((day,di)=>{
    const isChk=done(pi,S.wi,di);
    const row=d('day-row',{
      background:isChk?phase.color+'0d':(day.activity==='Rest'?'#f9f9f9':'white'),
      borderColor:isChk?phase.color+'44':'#e8e8e8',
      borderLeftColor:isChk?phase.color:dc(day.activity,phase.color)
    });
    row.onclick=()=>toggleDay(pi,S.wi,di);
    const cb=d('cb',{background:isChk?phase.color:'white',borderColor:isChk?phase.color:'#ccc'},isChk?'✓':'');
    row.appendChild(cb);
    row.appendChild(d('day-lbl',{color:isChk?'#bbb':'#444'},day.day));
    const info=d(null,null);
    const act=d('day-act',{color:isChk?'#bbb':(day.activity==='Rest'?'#aaa':'#1a1a1a'),textDecoration:isChk?'line-through':'none'},day.activity);
    info.appendChild(act);
    info.appendChild(d('day-notes-txt',null,day.notes));
    row.appendChild(info);
    row.appendChild(d('day-mi',{color:isChk?'#ccc':(day.miles?phase.color:'#ccc')},day.miles?`${day.miles} mi`:'—'));
    wrap.appendChild(row);
  });

  if(all) wrap.appendChild(d('week-complete',{background:phase.accent,border:`1px solid ${phase.color}44`,color:phase.color},'✓ Week complete — nice work!'));
  if(S.wi===phase.weeklySchedule.length-1) {
    const cn=d('coach-note',null,d('cn-lbl',null,"Coach's Note"),d('cn-txt',null,phase.keyNotes));
    wrap.appendChild(cn);
  }
  return wrap;
}

function renderMileage(phase, pi) {
  const wrap=d(null,null);
  const totals=phase.weeklySchedule.map(w=>parseFloat(w.total.replace(/[^0-9.]/g,''))||0);
  const mx=Math.max(...totals);
  phase.weeklySchedule.forEach((w,wi)=>{
    const row=d('mi-row',null);
    const top=d('mi-top',null,d('mi-wk',null,w.week),d('mi-total',{color:phase.color},w.total));
    row.appendChild(top);
    const dg=d('day-grid',null);
    w.days.forEach(day=>{
      const cell=d('day-cell',null,d('dc-lbl',null,day.day));
      const val=d('dc-val',{background:day.miles?phase.color:(day.activity==='Rest'?'#eee':'#fde8b0'),color:day.miles?'white':(day.activity==='Rest'?'#ccc':'#a07010')},day.miles?`${day.miles}`:(day.activity==='Rest'?'–':'CF'));
      cell.appendChild(val);
      dg.appendChild(cell);
    });
    row.appendChild(dg);
    wrap.appendChild(row);
  });
  // Bar chart
  const bc=d('bar-chart',null,d('bc-lbl',null,'Mileage Progression'));
  const bars=d('bars',null);
  totals.forEach((val,wi)=>{
    const pct=mx>0?(val/mx)*100:0;
    const col=d('bar-col',null,d('bar-fill',{height:`${pct}%`,background:phase.color}),d('bar-lbl',null,phase.weeklySchedule[wi].week.replace('Week ','W')));
    bars.appendChild(col);
  });
  bc.appendChild(bars);
  wrap.appendChild(bc);
  wrap.appendChild(d('coach-note',{marginTop:'13px'},d('cn-lbl',null,"Coach's Note"),d('cn-txt',null,phase.keyNotes)));
  return wrap;
}

function renderWarmup(phase, pi) {
  const wrap=d(null,null);
  const pn=warmupData.phaseNotes[pi];
  if(pn) {
    const box=d('pn-box',{background:phase.accent,border:`1px solid ${phase.color}33`},d('pn-icon',null,'📋'));
    const txt=d(null,null,d('pn-title',{color:phase.color},pn.phase),d('pn-text',null,pn.note));
    box.appendChild(txt);
    wrap.appendChild(box);
  }
  wrap.appendChild(sectionDiv('Before You Run'));
  [warmupData.weekday, warmupData.longRun].forEach(r=>wrap.appendChild(renderRoutine(r,r.color)));
  wrap.appendChild(sectionDiv('After You Run'));
  [[warmupData.cooldownWeekday,'#4a7c59'],[warmupData.cooldownLongRun,'#7a3b1e']].forEach(([r,c])=>wrap.appendChild(renderRoutine(r,c)));
  return wrap;
}

function sectionDiv(txt) {
  return d('sec-div',null,d('sec-div-txt',null,txt),d('sec-div-line',null));
}

function renderRoutine(routine, color) {
  const wrap=d(null,{marginBottom:'26px'});
  wrap.appendChild(d('routine-hdr',{borderLeftColor:color},d('routine-title',null,routine.title),d('routine-sub',{color:color},routine.subtitle)));
  wrap.appendChild(d('routine-note',null,routine.note));
  routine.steps.forEach(step=>{
    const fin=step.icon==='✅'||step.icon==='🥤';
    const row=d('step-row',{background:fin?'#f0faf4':'white',borderColor:fin?'#b0dfc0':'#e8e8e8',borderLeftColor:fin?'#4a7c59':color});
    row.appendChild(d('step-icon',null,step.icon));
    row.appendChild(d(null,null,d('step-name',null,step.name),d('step-desc',null,step.desc)));
    row.appendChild(d('step-dur',{color:color},step.duration||step.reps||''));
    wrap.appendChild(row);
  });
  return wrap;
}

function renderCalisthenics(pi) {
  const wrap = d(null,null);
  const data = calisthenicsData[pi];

  // Phase note
  const note = d('coach-note',{marginBottom:'18px'});
  note.appendChild(d('cn-lbl',null,'Daily 10 — ' + data.phase));
  note.appendChild(d('cn-txt',null,data.note));
  wrap.appendChild(note);

  // Blocks
  data.blocks.forEach(block => {
    // Block header
    const bh = d(null,{marginBottom:'12px',marginTop:'18px'});
    const title = d(null,{display:'flex',alignItems:'center',gap:'10px',marginBottom:'6px'});
    title.appendChild(d(null,{fontFamily:'system-ui,sans-serif',fontWeight:800,fontSize:'12px',letterSpacing:'2px',textTransform:'uppercase',color:block.color},block.title));
    const line = d(null,{flex:'1',height:'1px',background:'#e5e5e5'});
    title.appendChild(line);
    bh.appendChild(title);
    bh.appendChild(d(null,{fontFamily:'system-ui,sans-serif',fontSize:'11px',color:'#999'},block.duration));
    wrap.appendChild(bh);

    // Exercises
    block.exercises.forEach(ex => {
      const row = d('step-row',{borderLeftColor:block.color});
      row.appendChild(d('step-icon',null,ex.icon));
      const info = d(null,null);
      info.appendChild(d('step-name',null,ex.name));
      info.appendChild(d('step-desc',null,ex.desc));
      row.appendChild(info);
      const meta = d(null,{textAlign:'right',minWidth:'65px'});
      if(ex.sets) meta.appendChild(d('step-dur',{color:block.color,display:'block'},ex.sets));
      meta.appendChild(d('step-dur',{color:block.color,display:'block'},ex.reps));
      row.appendChild(meta);
      wrap.appendChild(row);
    });
  });

  return wrap;
}

function renderNutrition(phase, pi) {
  const wrap=d(null,null);
  const cb=d('cal-box',{background:phase.color},d('cal-lbl',null,`Daily Targets — ${phase.cals.label}`));
  const cg=d('cal-grid',null);
  [['Easy / CrossFit Days',phase.cals.easy],['Long Run Days',phase.cals.longRun]].forEach(([l,v])=>{
    cg.appendChild(d('cal-card',null,d('cal-card-lbl',null,l),d('cal-card-val',null,v),d('cal-card-unit',null,'calories')));
  });
  cb.appendChild(cg);
  const md=d('macro-div',null,d('macro-lbl',null,'Macros (Easy Days)'));
  const mg=d('macro-grid',null);
  [['Protein',phase.macros.protein],['Carbs',phase.macros.carbs],['Fat',phase.macros.fat]].forEach(([n,v])=>{
    mg.appendChild(d('macro-card',null,d('macro-val',null,v),d('macro-name',null,n)));
  });
  md.appendChild(mg);
  cb.appendChild(md);
  wrap.appendChild(cb);
  phase.nutrition.forEach(n=>{
    wrap.appendChild(d('nutr-card',{borderLeftColor:phase.color},d('nutr-title',null,n.title),d('nutr-detail',null,n.detail)));
  });
  return wrap;
}

function renderRaceDay() {
  const wrap=d(null,null,h('h2','race-h2',null,raceDay.title),d('race-sub',null,"You've done the work. This is just execution."));
  raceDay.sections.forEach(sec=>{
    const s=d('race-section',null,d('race-sec-title',null,sec.heading));
    sec.items.forEach(item=>{
      s.appendChild(d('race-item',null,d('race-dot',null),d('race-txt',null,item)));
    });
    wrap.appendChild(s);
  });
  return wrap;
}

// ── Install prompt ─────────────────────────────────────────────────
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault(); deferredPrompt=e;
  document.getElementById('install-banner').style.display='flex';
});
document.getElementById('install-btn').onclick=()=>{ if(deferredPrompt) deferredPrompt.prompt(); };
window.addEventListener('appinstalled',()=>{ document.getElementById('install-banner').style.display='none'; });

// ── Service Worker ─────────────────────────────────────────────────
if('serviceWorker' in navigator) {
  const swCode = `
const CACHE='fc50k-v1';
self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('activate',e=>{self.clients.claim();});
self.addEventListener('fetch',e=>{
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    const clone=res.clone();
    caches.open(CACHE).then(c=>c.put(e.request,clone));
    return res;
  }).catch(()=>caches.match('/'))));
});`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

// ── Init ───────────────────────────────────────────────────────────
render();
</script>
