      { name: "Pigeon pose", duration: "90 sec each", reps: null, desc: "From a plank, bring one knee forward behind your wrist. Lower your hips. This is the single best post-run hip stretch. It will feel intense after a long trail run — that means you need it.", icon: "🕊️" },
      { name: "Supine hamstring stretch", duration: "45 sec each", reps: null, desc: "Lie on your back, loop a towel or strap around one foot and pull the leg toward you. Keep the other leg flat on the ground. Gentler on the lower back than seated versions.", icon: "🧘" },
      { name: "Calf stretch — both versions", duration: "45 sec each", reps: null, desc: "Straight leg then bent knee, same as the weekday routine. Do both sides, both versions. Non-negotiable after trail runs.", icon: "🦶" },
      { name: "Legs up the wall", duration: "5 min", reps: null, desc: "Lie on your back with your legs resting up a wall. Reduces swelling, drains lactic acid, calms the nervous system. Optional but extremely effective after runs over 2 hours.", icon: "🧱" },
      { name: "Recovery nutrition", duration: "Within 30 min", reps: null, desc: "500–700 calories: pea protein smoothie + a carb-rich snack, or a full meal. This is not optional. Your muscles are in an active repair window for the next 2 hours.", icon: "🥤" },
    ],
  },
};

const raceDay = {
  title: "Race Day — November 21, 2026",
  sections: [
    {
      heading: "Morning Timeline",
      items: [
        "4:00am — Wake up. Minimal stress. Everything is packed already.",
        "4:30am — Eat full breakfast: oatmeal, banana, almond butter, coffee.",
        "5:30am — Arrive at start. Pick up bib. Gear check. Drop bag drop.",
        "6:00am — Line up. Warm up lightly. Layer up — it will be cold.",
        "6:30am — START. Go out conservative. The first 3 miles will feel easy. That's a trap.",
      ],
    },
    {
      heading: "Pacing Strategy",
      items: [
        "Miles 1–10: Controlled and conversational. Hike every climb. Don't race anyone.",
        "Miles 10–20: Settle into your rhythm. This is where your training miles pay off.",
        "Miles 20–28: Stay on nutrition. Mental toughness phase. One mile at a time.",
        "Miles 28–31: You're going to finish. Run what you can, hike what you need.",
      ],
    },
    {
      heading: "Gear Checklist",
      items: [
        "Layering system: base layer + mid layer + wind shell — temperature swings 20–60°F",
        "Gloves and hat for the cold morning start",
        "Trail shoes with grip — the course is rugged in sections",
        "Hydration vest with 1.5–2L capacity",
        "Headlamp (for early start darkness — not needed if finishing well before dark)",
        "Drop bag: dry socks, dry shirt, extra food, trekking poles if desired",
        "Phone fully charged, emergency contacts noted",
      ],
    },
  ],
};

const dayColors = {
  "CrossFit": "#e8a020",
  "CrossFit (light)": "#e8a020",
  "CrossFit or Rest": "#e8a020",
  "Rest": "#ccc",
};


// ── State ──────────────────────────────────────────────────────────
let S = { pi: 0, tab: 'schedule', wi: 0, checked: {} };
try { const s = localStorage.getItem('fc50k'); if(s) S.checked = JSON.parse(s); } catch(e) {}
function save() { try { localStorage.setItem('fc50k', JSON.stringify(S.checked)); } catch(e) {} }
function toggleDay(pi,wi,di) { const k=`p${pi}-w${wi}-d${di}`; S.checked[k]=!S.checked[k]; save(); render(); }
function done(pi,wi,di) { return !!S.checked[`p${pi}-w${wi}-d${di}`]; }
function weekDone(pi,wi,n) { let c=0; for(let d=0;d<n;d++) if(S.checked[`p${pi}-w${wi}-d${d}`])c++; return c; }

// ── Helpers ────────────────────────────────────────────────────────
function dc(activity, phaseColor) {
  if(activity==='Rest') return '#ccc';
  if(activity.startsWith('CrossFit')) return '#e8a020';
  if(activity==='RACE DAY') return '#8a3a3a';
  return phaseColor;
}
function h(tag, cls, style, ...kids) {
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(style) Object.assign(e.style, style);
  for(const k of kids.flat(99)) {
    if(k==null) continue;
    e.appendChild(typeof k==='string' ? document.createTextNode(k) : k);
  }
  return e;
}
function d(cls,style,...kids) { return h('div',cls,style,...kids); }
function s(cls,style,...kids) { return h('span',cls,style,...kids); }
function btn(cls,style,onclick,...kids) {
  const e=h('button',cls,style,...kids);
  e.onclick=onclick;
  return e;
}

// ── Render ─────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  while(app.firstChild) app.removeChild(app.firstChild);

  app.appendChild(renderHeader());
  app.appendChild(renderPhaseNav());
  const content = d('content',null);
  if(S.pi===4) content.appendChild(renderRaceDay());
  else content.appendChild(renderPhase(phases[S.pi], S.pi));
  app.appendChild(content);

  // scroll to top on phase/tab change
  window.scrollTo(0,0);
}

function renderHeader() {
  const wrap = d('header',null);
  wrap.appendChild(d('header-eyebrow',null,'Fall Creek Falls, Tennessee'));
  wrap.appendChild(h('h1',null,null,'Fall Creek 100 · 50K'));
  wrap.appendChild(d('header-sub',null,'21-Week Training Plan · June 29 – November 21, 2026'));
  const stats = d('header-stats',null);
  [['Race Day','Nov 21, 2026'],['Start','6:30am'],['Distance','50K'],['Elev.','3,100ft'],['Goal Wt','≤165 lbs'],['Cutoff','18 hrs']].forEach(([l,v])=>{
    const st = d('stat',null);
    st.appendChild(h('label',null,null,l));
    st.appendChild(h('span',null,null,v));
    stats.appendChild(st);
  });
  wrap.appendChild(stats);
  return wrap;
}

function renderPhaseNav() {
  const nav = d('phase-nav',null);
  phases.forEach((ph,i)=>{
    const isA = S.pi===i;
    const b = btn('phase-btn'+(isA?' active':''), isA?{background:ph.color,borderBottomColor:ph.color}:{},
      ()=>{ S.pi=i; S.tab='schedule'; S.wi=0; render(); },
      ph.name.split(':')[0], h('small',null,null,ph.weeks)
    );
    nav.appendChild(b);
  });
  const isR = S.pi===4;
  nav.appendChild(btn('phase-btn'+(isR?' active':''), isR?{background:'#8a3a3a',borderBottomColor:'#8a3a3a'}:{},
    ()=>{ S.pi=4; render(); }, 'Race Day', h('small',null,null,'Nov 21')
  ));
  return nav;
}

function renderPhase(phase, pi) {
  const wrap = d(null,null);
  wrap.appendChild(d('eyebrow',{color:phase.color},`${phase.weeks} · ${phase.dates}`));
  wrap.appendChild(h('h2','phase-title',null,phase.name));
  wrap.appendChild(d('phase-sub',null,phase.subtitle));

  // Goals
  const gb = d('goals-box',{background:phase.accent,border:`1px solid ${phase.color}22`});
  gb.appendChild(d('goals-lbl',{color:phase.color},'Phase Goals'));
  phase.goals.forEach(g=>{
    const row=d('goal-row',null);
    row.appendChild(d('goal-chk',{color:phase.color},'✓'));
    row.appendChild(d('goal-txt',null,g));
    gb.appendChild(row);
  });
  wrap.appendChild(gb);

  // Tabs
  const tb = d('tab-bar',null);
  [['schedule','Weekly Schedule'],['mileage','Mileage'],['warmup','Pre/Post Run'],['nutrition','Nutrition']].forEach(([id,lbl])=>{
    const isA=S.tab===id;
    tb.appendChild(btn('tab-btn'+(isA?' active':''), isA?{color:phase.color,borderBottomColor:phase.color}:{}, ()=>{S.tab=id;render();}, lbl));
  });
  wrap.appendChild(tb);

  if(S.tab==='schedule') wrap.appendChild(renderSchedule(phase,pi));
  else if(S.tab==='mileage') wrap.appendChild(renderMileage(phase,pi));
  else if(S.tab==='warmup') wrap.appendChild(renderWarmup(phase,pi));
  else if(S.tab==='nutrition') wrap.appendChild(renderNutrition(phase,pi));
  return wrap;
}

function renderSchedule(phase, pi) {
  const wrap = d(null,null);
  // Pills
  const pills = d('week-pills',null);
  phase.weeklySchedule.forEach((w,wi)=>{
    const c=weekDone(pi,wi,w.days.length), all=c===w.days.length;
    const isA=S.wi===wi;
    const b=btn('week-pill'+(isA?' active':''),{
      background:isA?phase.color:all?phase.color+'22':'white',
      color:isA?'white':'#555',
      borderColor:isA?phase.color:all?phase.color:'#ddd'
    },()=>{S.wi=wi;render();}, w.week.replace('Week ','Wk '));
    if(c>0) b.appendChild(s(null,{marginLeft:'4px',fontSize:'9px',background:all?(isA?'rgba(255,255,255,0.3)':phase.color):'#aaa',color:'white',borderRadius:'10px',padding:'1px 4px',fontWeight:700}, all?'✓':`${c}/${w.days.length}`));
    pills.appendChild(b);
  });
  wrap.appendChild(pills);

  const w=phase.weeklySchedule[S.wi];
  const c=weekDone(pi,S.wi,w.days.length), all=c===w.days.length;

  // Week header
  const wh=d('week-header',null);
  const wt=d(null,null,d('week-title-txt',null,w.week),d('week-dates-txt',null,w.label));
  const wm=d('week-meta',null,d('week-count',null,`${c}/${w.days.length} days`),d('week-badge',{background:phase.color},w.total));
  wh.appendChild(wt); wh.appendChild(wm);
  wrap.appendChild(wh);

  // Progress
  const pb=d('progress-bar',null,d('progress-fill',{width:`${(c/w.days.length)*100}%`,background:phase.color}));
  wrap.appendChild(pb);

  // Days
  w.days.forEach((day,di)=>{
    const isChk=done(pi,S.wi,di);
    const row=d('day-row',{
      background:isChk?phase.color+'0d':(day.activity==='Rest'?'#f9f9f9':'white'),
      borderColor:isChk?phase.color+'44':'#e8e8e8',
      borderLeftColor:isChk?phase.color:dc(day.activity,phase.color)
    });
    row.onclick=()=>toggleDay(pi,S.wi,di);
    const cb=d('cb',{background:isChk?phase.color:'white',borderColor:isChk?phase.color:'#ccc'},isChk?'✓':'');
    row.appendChild(cb);
    row.appendChild(d('day-lbl',{color:isChk?'#bbb':'#444'},day.day));
    const info=d(null,null);
    const act=d('day-act',{color:isChk?'#bbb':(day.activity==='Rest'?'#aaa':'#1a1a1a'),textDecoration:isChk?'line-through':'none'},day.activity);
    info.appendChild(act);
    info.appendChild(d('day-notes-txt',null,day.notes));
    row.appendChild(info);
    row.appendChild(d('day-mi',{color:isChk?'#ccc':(day.miles?phase.color:'#ccc')},day.miles?`${day.miles} mi`:'—'));
    wrap.appendChild(row);
  });

  if(all) wrap.appendChild(d('week-complete',{background:phase.accent,border:`1px solid ${phase.color}44`,color:phase.color},'✓ Week complete — nice work!'));
  if(S.wi===phase.weeklySchedule.length-1) {
    const cn=d('coach-note',null,d('cn-lbl',null,"Coach's Note"),d('cn-txt',null,phase.keyNotes));
    wrap.appendChild(cn);
  }
  return wrap;
}

function renderMileage(phase, pi) {
  const wrap=d(null,null);
  const totals=phase.weeklySchedule.map(w=>parseFloat(w.total.replace(/[^0-9.]/g,''))||0);
  const mx=Math.max(...totals);
  phase.weeklySchedule.forEach((w,wi)=>{
    const row=d('mi-row',null);
    const top=d('mi-top',null,d('mi-wk',null,w.week),d('mi-total',{color:phase.color},w.total));
    row.appendChild(top);
    const dg=d('day-grid',null);
    w.days.forEach(day=>{
      const cell=d('day-cell',null,d('dc-lbl',null,day.day));
      const val=d('dc-val',{background:day.miles?phase.color:(day.activity==='Rest'?'#eee':'#fde8b0'),color:day.miles?'white':(day.activity==='Rest'?'#ccc':'#a07010')},day.miles?`${day.miles}`:(day.activity==='Rest'?'–':'CF'));
      cell.appendChild(val);
      dg.appendChild(cell);
    });
    row.appendChild(dg);
    wrap.appendChild(row);
  });
  // Bar chart
  const bc=d('bar-chart',null,d('bc-lbl',null,'Mileage Progression'));
  const bars=d('bars',null);
  totals.forEach((val,wi)=>{
    const pct=mx>0?(val/mx)*100:0;
    const col=d('bar-col',null,d('bar-fill',{height:`${pct}%`,background:phase.color}),d('bar-lbl',null,phase.weeklySchedule[wi].week.replace('Week ','W')));
    bars.appendChild(col);
  });
  bc.appendChild(bars);
  wrap.appendChild(bc);
  wrap.appendChild(d('coach-note',{marginTop:'13px'},d('cn-lbl',null,"Coach's Note"),d('cn-txt',null,phase.keyNotes)));
  return wrap;
}

function renderWarmup(phase, pi) {
  const wrap=d(null,null);
  const pn=warmupData.phaseNotes[pi];
  if(pn) {
    const box=d('pn-box',{background:phase.accent,border:`1px solid ${phase.color}33`},d('pn-icon',null,'📋'));
    const txt=d(null,null,d('pn-title',{color:phase.color},pn.phase),d('pn-text',null,pn.note));
    box.appendChild(txt);
    wrap.appendChild(box);
  }
  wrap.appendChild(sectionDiv('Before You Run'));
  [warmupData.weekday, warmupData.longRun].forEach(r=>wrap.appendChild(renderRoutine(r,r.color)));
  wrap.appendChild(sectionDiv('After You Run'));
  [[warmupData.cooldownWeekday,'#4a7c59'],[warmupData.cooldownLongRun,'#7a3b1e']].forEach(([r,c])=>wrap.appendChild(renderRoutine(r,c)));
  return wrap;
}

function sectionDiv(txt) {
  return d('sec-div',null,d('sec-div-txt',null,txt),d('sec-div-line',null));
}

function renderRoutine(routine, color) {
  const wrap=d(null,{marginBottom:'26px'});
  wrap.appendChild(d('routine-hdr',{borderLeftColor:color},d('routine-title',null,routine.title),d('routine-sub',{color:color},routine.subtitle)));
  wrap.appendChild(d('routine-note',null,routine.note));
  routine.steps.forEach(step=>{
    const fin=step.icon==='✅'||step.icon==='🥤';
    const row=d('step-row',{background:fin?'#f0faf4':'white',borderColor:fin?'#b0dfc0':'#e8e8e8',borderLeftColor:fin?'#4a7c59':color});
    row.appendChild(d('step-icon',null,step.icon));
    row.appendChild(d(null,null,d('step-name',null,step.name),d('step-desc',null,step.desc)));
    row.appendChild(d('step-dur',{color:color},step.duration||step.reps||''));
    wrap.appendChild(row);
  });
  return wrap;
}

function renderNutrition(phase, pi) {
  const wrap=d(null,null);
  const cb=d('cal-box',{background:phase.color},d('cal-lbl',null,`Daily Targets — ${phase.cals.label}`));
  const cg=d('cal-grid',null);
  [['Easy / CrossFit Days',phase.cals.easy],['Long Run Days',phase.cals.longRun]].forEach(([l,v])=>{
    cg.appendChild(d('cal-card',null,d('cal-card-lbl',null,l),d('cal-card-val',null,v),d('cal-card-unit',null,'calories')));
  });
  cb.appendChild(cg);
  const md=d('macro-div',null,d('macro-lbl',null,'Macros (Easy Days)'));
  const mg=d('macro-grid',null);
  [['Protein',phase.macros.protein],['Carbs',phase.macros.carbs],['Fat',phase.macros.fat]].forEach(([n,v])=>{
    mg.appendChild(d('macro-card',null,d('macro-val',null,v),d('macro-name',null,n)));
  });
  md.appendChild(mg);
  cb.appendChild(md);
  wrap.appendChild(cb);
  phase.nutrition.forEach(n=>{
    wrap.appendChild(d('nutr-card',{borderLeftColor:phase.color},d('nutr-title',null,n.title),d('nutr-detail',null,n.detail)));
  });
  return wrap;
}

function renderRaceDay() {
  const wrap=d(null,null,h('h2','race-h2',null,raceDay.title),d('race-sub',null,"You've done the work. This is just execution."));
  raceDay.sections.forEach(sec=>{
    const s=d('race-section',null,d('race-sec-title',null,sec.heading));
    sec.items.forEach(item=>{
      s.appendChild(d('race-item',null,d('race-dot',null),d('race-txt',null,item)));
    });
    wrap.appendChild(s);
  });
  return wrap;
}

// ── Install prompt ─────────────────────────────────────────────────
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault(); deferredPrompt=e;
  document.getElementById('install-banner').style.display='flex';
});
document.getElementById('install-btn').onclick=()=>{ if(deferredPrompt) deferredPrompt.prompt(); };
window.addEventListener('appinstalled',()=>{ document.getElementById('install-banner').style.display='none'; });

// ── Service Worker ─────────────────────────────────────────────────
if('serviceWorker' in navigator) {
  const swCode = `
const CACHE='fc50k-v1';
self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('activate',e=>{self.clients.claim();});
self.addEventListener('fetch',e=>{
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    const clone=res.clone();
    caches.open(CACHE).then(c=>c.put(e.request,clone));
    return res;
  }).catch(()=>caches.match('/'))));
});`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

// ── Init ───────────────────────────────────────────────────────────
render();
</script>
